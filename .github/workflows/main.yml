name: Build vdexExtractor (Linux-Safe)

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: anestisb/vdexExtractor
          fetch-depth: 1

      - name: Install Build Tools
        run: |
          sudo apt-get update
          # 安装必要的 C 开发库和 zlib
          sudo apt-get install -y gcc make zlib1g-dev libssl-dev

      - name: Patch and Build
        run: |
          # 移除会导致编译中断的严格警告检查
          sed -i 's/-Werror//g' src/Makefile
          # 执行编译脚本
          ./make.sh gcc

      - name: Check Binary
        run: ls -l bin/vdexExtractor

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vdexExtractor-linux
          path: bin/vdexExtractor
